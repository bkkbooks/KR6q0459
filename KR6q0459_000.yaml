body:
  text: 天童宏智覺禪師語録序洞上宗風自同安兩世至芙蓉長蘆卓然今古天童宏智禪師與大慧杲真歇了同時智住天童慧住育王其唱酬入滅事頗著神異紹興迄今殆數百年語句散亡罕睹全録晴雲法兄於他家雜見者廣為搜緝勒成一卷昔靈山法藏傳彼貝多韶陽語句得自衣裓此皆目擊口宣借書在手晴兄默契古人探微集逸能使太白山巔自開生面固知金針玉線迥異尋常陽燧取日方諸印月也洞山宗旨持以問之此集功位宛然新豐尚在矣逸亭居士徐繼恩拜題明州天童景德禪寺宏智覺禪師語録目次卷一上堂晚參示衆卷二舉古卷三頌古卷四機緣塔銘銘偈記
