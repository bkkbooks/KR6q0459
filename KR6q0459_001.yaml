body:
  text: 武林苕溪鳳山後學淨啓重編上堂上堂黃閣簾垂誰傳家信紫羅帳合暗撒真珠正恁麼時視聽有所不到言詮有所不及如何通得箇消息去夢回夜色依俙曉笑指家風爛熳春上堂舉參同契云回互不回互僧問雲門如何是回互門指板頭云不可喚作板頭僧云如何是不回互門云者箇是板頭師云石頭舌頭無骨雲門眼裏有筋千古之下聲光赫奕如今要把手共行直須恁麼始解不恁麼然後沒交涉還相委悉麼少年曾決龍蛇陳潦倒還聽稚子歌上堂心不能緣口不能議直饒退步荷擔切忌當頭觸諱風月寒清古渡頭夜船撥轉琉璃地上堂舉白水垂語云眼裏著沙不得耳裏著水不得僧便問如何是眼裏著沙不得水云應真無比僧云如何是耳裏著水不得水云白淨無垢師云白水老人可謂大而無外小而無內具足千變萬化秖箇赤手空身不受一滴塵直是滿眼滿耳還見麼立足無間地知心有幾人上堂舉金峰示衆云事存函蓋合理應箭鋒拄若人道得金峰分半院與他住時有僧出禮拜峰云休休相見易得好共住難為人師云重賞之下必有勇夫者僧擬乎強取金峰又卻不甘還知蚌鷸相持盡落漁人之手若也辨得函蓋箭鋒金峰一院兩手分付上堂舉僧問曹山子歸就父為什麼父全不顧山云理合如斯僧云父子之恩何在山云始成父子之恩僧云如何是父子之恩山云刀斧斫不開師云翡翠簾垂絲綸未降紫羅帳合視聽難通犯動毫頭月升夜戶密移一步鶴出銀籠還知麼脫身一色無遺影不坐同風落大功上堂今日是釋迦老子降誕之辰長蘆不解說禪與諸人畫箇樣子祇如在摩耶胎時作麼生以拂子畫此相曰秖如以清淨水浴金色身時又作麼生復畫此相曰秖如周行七步目顧四方指天指地成道說法神通變化智慧辨才四十九年三百餘會說青道黃指東畫西入般涅槃時又作麼生乃畫此相復曰若是具眼衲僧必也相許其或未然一一歷過始得上堂舉僧問雲門不起一念還有過也無門云須彌山師云不起一念向道須彌舌頭一臠肉口唇兩片皮雲門機用妙如許不落是非知不知上堂舉風穴垂語云若立一塵家國興盛不立一塵家國喪亡師云還有同生同死底衲僧麼復頌云幾許歡心幾許愁好看野老兩眉頭家邦平貼清如鏡水瘦山空一樣秋上堂舉鏡清問靈雲混沌未分時如何雲云露柱懷胎清云分後如何雲云如片雲點太清清云秖如太清還受點也無雲不對清云恁麼則含生不來也雲亦不對清云直得純清絶點時如何雲云猶是真常流注清云如何是真常流注雲云如鏡常明清云向上更有事不雲云有清云如何是向上事雲曰打破鏡來與子相見師云分與未分玉機夜動點與不點金梭暗拋直是一色純清未得十成安穩且道打破鏡來向什麼處相見還會麼清秋老兔吞光後湛水蒼龍蛻骨時上堂舉石鞏上堂乃張弓架箭三平擘開胸當之鞏云一張弓兩隻箭秖射得半箇聖人師云石鞏習氣不除三平相席打令卻云三十年一張弓兩隻箭秖射得半箇聖人豈不是以己方人大都不入驚人浪到了難尋稱意魚上堂空劫有真宗聲前問己躬赤窮新活計清白舊家風的的三乘外寥寥一印中卻來行異類萬派自朝東上堂舉雪峰住庵二僧來拜峰見兩手托門放身出云是什麼僧云是什麼峰低頭歸庵僧到巖頭頭問什麼處來僧云嶺南來頭云曾到雪峰麼僧云曾到頭云有何言句僧舉前話頭云他道什麼僧云他無語低頭歸庵頭云噫我當初悔不向他道末後句若向他道天下人不奈雪老何僧至夏末再舉前話請益頭云何不早問僧云未敢容易頭云雪峰與我同條生不與我同條死要識末後句只者是師云切磋琢磨變態淆訛葛陂化龍之杖陶家居蟄之梭同條生兮有數同條死兮無多末後句只者是風舟載月浮秋水上堂舉僧問趙州學人乍入叢林乞師指示州云喫粥了也未僧云喫粥了州云洗鉢去師云粥罷令教洗鉢盂豁然心地自相符而今參飽叢林客且道其問有悟無上堂舉僧問雲門如何是清淨法身門云花藥欄僧云便恁麼去時如何門云金毛獅子雪竇著語云太無端師云賊來須打客來須待雲門雪竇二俱作家者裏莫有恁麼去者麼切忌撞頭磕額上堂舉志公云終日拈香擇火不知身是道場師云弄精魂漢有甚麼限玄沙云終日拈香擇火不知真個道場師云奇怪八十翁翁入場屋不是小兒嬉且道利害在甚麼處有智無智較三十里上堂舉藥山久不升座院主請為衆說法衆才集山登座良久便歸方丈院主云和尚何不為衆說法山云經有經師論有論師爭怪得老僧師云家法簡嚴非二非三月來明湛水雲退露寒嵒真機自得妙處誰參不是文殊白槌後也應千古屈瞿曇上堂僧問如何是向去底人師曰白雲投壑盡青嶂倚空高曰如何是卻來底人師曰滿頭白髮離嵒谷半夜穿雲入市廛曰如何是不來不去底人師曰石女喚回三界夢木人坐斷六門機乃曰句裏明宗則易宗中辨的則難良久曰還會麼凍雞未報家林曉隱隱行人過雪山上堂舉僧問魯祖如何是不言言祖云汝口在甚麼處僧云無口祖云將什麼喫飯僧無對師云者僧只解握死蛇頭不能捋猛虎鬚當時待他問你口在什麼處便與一喝拂袖便行直饒魯祖全機往往做手腳不及上堂舉仰山夢往彌勒內院居第二座有一尊者白椎云今日當第二座說法仰乃起白椎云摩訶衍法離四句絶百非諦聽諦聽次日舉似溈山溈云子已登聖位師云玉女依稀夜動機錦絲歷歷吐梭臍水天湛碧全功墮雪月寒清一色迷諸禪德全功負墮一色猶迷作麼生體悉得相應去權挂垢衣云是佛卻披珍御復名誰上堂諸禪德吞盡三世佛底人為甚麼開口不得照破四天下底人為甚麼合眼不得許多病痛與你一時拈卻了也且作麼生得十成通暢去還會麼擘開華嶽連天色放出黃河到海聲上堂舉雲門因僧問秋初夏末前程若有人問作麼生秖對門云大衆退後僧云未審過在甚麼處門云還我九十日飯錢來師云大衆退後衲僧去就豈用機關那容體究蓑翁老熟慣風波櫓橈不施船放淄上堂舉僧問曹山佛未出世時如何山云曹山不如僧云出世後如何山云不如曹山師云佛與曹山主賓互換出世不出世各具一隻眼未有長行而不住長住而不行還會麼幽洞豈拘關鎖意縱橫不涉兩頭機上堂舉雲門示衆云直得觸目無滯達得名身句身一切法空山河大地是名身亦不可得喚作三昧性海俱備猶是無風匝匝之波直得亡知於覺覺即佛性矣喚作無事人更須知有向上一竅在師云賓主不諧二俱有過各與二十棒秖如向上一竅又作麼生犀因玩月紋生角象被雷驚花入牙上堂舉石霜因僧自洞山來霜問洞山和尚有何言句僧云解夏上堂云秋初夏末兄弟們或東去西去直須向萬里無寸草處去良久云祇如萬里無寸草處作麼去霜曰有人下語否僧曰無霜曰何不道出門便是草僧舉似洞山山曰瀏陽有古佛耶師曰出門是草涉芊芊莽莽之間葉落知秋墮黯黯青青之處到者裏須體取機雖轉紐印未成文處始得良久云水明老蚌懷胎後雲重蒼龍退骨時上堂舉僧問雲門如何是塵塵三昧門云鉢裏飯桶裏水師云塵塵三昧彼彼不外千峰向嶽百川赴海更無一法不如來只箇堂堂觀自在上堂舉乾峰示衆云舉一不得舉二放過一著落在第二雲門出衆曰昨日有人從天台來卻往徑山去峰曰來日不得普請師云坐斷十方千差路絶放開一線萬派朝宗二尊宿開拓家風方見衲僧去就還端的麼太平天子寰中旨汗血將軍塞外心上堂舉首山念禪師因僧問如何是佛山云新婦騎驢阿家牽師云新婦騎驢阿家牽體段風流得自然堪笑效顰鄰舍女向人添醜不成妍上堂舉香林遠禪師因僧問如何是衲衣下事林云臘月火燒山師云老大叢林快說禪不將禪挂口皮邊谷深山遠空無像何處人呼應不圓上堂舉僧到夾山山問近離甚處曰洞山山曰洞山有何言句曰和尚道我有三路接人夾山曰有何三路曰鳥道玄路展手山曰實有此三路耶曰是山曰鬼持千里鈔林下道人悲後浮山遠著語云不因黃葉落爭知是一秋師云欲明三的旨莫向二邊求復云洪波浩渺接盲龜鳥道無私絶有為開口見心玄路香扇兒遮面露蛾眉上堂一點環中照極微智無功處卻存知緣思淨盡無餘事半夜星河斗柄垂上堂舉盤山垂語云若言即心即佛今時未入玄微若言非心非佛亦是指蹤極則師云有錢不解使解使卻無錢且道作麼生得十成去娶他年少婦須是白頭兒晚參晚參舉大耳三藏得他心通朝見肅宗帝帝命忠國師驗之藏見國師便禮拜側立於右國師云汝得他心通是不藏云不敢國師云汝道老僧秪今在什麼處藏云和尚是一國之師何得在西川看競渡國師再問汝道老僧即今在什麼處藏云和尚是一國之師何得在天津橋上看弄猢猻國師第三次問老僧即今在什麼處藏罔知去處國師叱云者野狐精他心通在什麼處師云三藏不見國師則且置你道國師自知下落處麼若謂自知則百鳥銜花諸天供養未有休日且道正當恁麼時落在什麼處晚參舉陸亙大夫問南泉弟子家中有一片石有時坐有時臥欲鐫作佛得不泉云得陸云莫不得不泉云不得雲巖云坐則佛不坐則非佛洞山云不坐則佛坐則非佛師云轉功就位轉位就功還他洞上父子且道南泉意作麼生直是針錐不得晚參舉佛前有一女子入定佛敕文殊出定殊乃運神力托上梵天出定不得佛乃云下方罔明大士能出此定須臾罔明至敕令出定罔明彈指三下女子便出定師云若定若動當人變弄鴻毛輕而不輕太山重而非重還知老瞿曇鼻孔在我手裏麼晚參舉雪峰與三聖行次見一隊猢猻峰云秖者猢猻各各背一面古鏡聖云歷劫無名何以彰為古鏡峰云瑕生也聖云一千五百人善知識話頭也不識峰云老僧住持事繁師云當時若見雪峰道瑕生也但近前云喏喏且道何故如此爭之不足讓之有餘晚參舉法眼問覺上座船來陸來覺云船來眼云船在甚麼處覺云船在河裏覺退眼問傍僧云你道適來者僧具眼不具眼師云水不洗水金不博金昧毛色而得馬靡絲絃而樂琴結繩畫卦有許事喪盡真淳太古心晚參舉曹山問德上座佛真法身猶若虛空應物現形如水中月作麼生說箇應底道理德云如驢覷井山云道則太煞道只道得八成德云和尚又如何山云如井覷驢師云驢覷井井覷驢智容無外淨涵有餘肘後誰分印家中不蓄書機絲不挂梭頭事文彩縱橫意自殊晚參舉長慶示衆云淨潔打疊了近前就我索驀脊與你一棒有者棒到你你須具大慚愧若無者一棒到你你向甚麼處會師云開口喫常住飯展腳臥長連床求箇知慚愧者難得還知長慶棒落處麼雷開蟄戶電燒尾引出崢嶸頭角來晚參舉黃檗示衆云汝等諸人盡是噇酒糟漢與麼行腳何處有今日還知大唐國裏無禪師麼僧云只如諸方匡徒領衆又作麼生檗云不道無禪只是無師師云岐分絲染太勞勞葉綴花聯敗祖曹妙握司南造化柄水雲器具在甄陶屏割繁碎剪除氄毛星衡藻鑑玉尺金刀黃檗老察秋毫坐斷春風不放高晚參舉雲巖問道吾大悲菩薩用許多手眼作麼吾云如人夜間背手摸枕子巖云我會也吾云汝作麼生會巖云遍身是手眼吾云道即太煞道只道得八成巖云師兄作麼生吾云通身是手眼師云一竅虛通八面玲瓏無象無私春入律不留不礙月行空清淨寶目功德臂遍身何似通身是現前手眼顯全機大用縱橫何忌諱晚參舉僧問洞山時時勤拂拭莫使惹塵埃為什麼不得他衣鉢山云直饒道本來無一物也未得他衣鉢且道什麼人合得僧下九十六轉語不契末後云設使將來他亦不受山深肯之雪竇云他既不受是眼將來必應是瞎師云長蘆則不然直須將來若不將來爭知不受若不不受爭免將來將來底必應是眼不受底真箇是瞎還會麼照盡體無依通身合大道晚參舉雪峰在德山作飯頭一日飯遲德山托鉢至法堂峰云者老漢鐘未鳴鼓未響托鉢向什麼處去山便歸方丈峰舉似巖頭頭云大小德山不會末後句山聞令侍者喚巖頭問汝不肯老僧那巖密啓前意山乃休去至明日升堂果與尋常不同巖撫掌笑云且喜老漢會末後句他後天下人不奈伊何師云末後句會也無德山父子太含糊座中亦有江南客莫向樽前唱鷓鴣晚參舉密師伯與洞山行見白兔子面前走過密云俊哉山云作麼生密云如白衣拜相山云老老大大作者箇語話密云你作麼生山云積代簪纓暫時落魄師云抗力霜雪平步雲霄下惠黜國相如過橋蕭曹謀略能成漢果許身心欲避堯寵辱若驚深自信真情參跡混漁樵晚參舉嚴陽尊者問趙州一物不將來時如何州云放下著嚴云一物不將來放下箇什麼州云恁麼則擔取去師云不防細行輸先手自覺心粗愧撞頭局破腰間斧柯爛洗清凡骨共仙遊晚參舉僧問青林虔禪師學人徑往時如何林云死蛇當大路勸子莫當頭僧云當頭時如何林云喪子性命僧云不當頭時如何林云亦無回避處僧云正當恁麼時如何林云失卻了也僧云未審向甚麼處去林云草深無覓處僧云和尚也須隄防始得林撫掌云一等是箇毒氣師云三老暗轉柁孤舟夜回頭蘆花兩岸雪煙水一江秋風力扶帆行不棹笛聲喚月下滄洲晚參舉巖頭辭德山山云子向甚麼處去頭云暫辭和尚下山去山云子他後作麼生頭云不忘和尚山云子憑何有此語頭云豈不聞智與師齊減師半德智過於師方堪傳授山云如是如是善自護持師云德山尋常棒下不立佛祖及乎到者時節得恁麼老婆雖然是養子之緣爭免得後人檢責待伊道智過於師方堪傳授拽拄杖驀脊便打晚參舉金剛經云若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業則為消滅師云綴綴功過膠膠因果鏡外狂奔演若多杖頭擊著破灶墮破來相賀卻道從前辜負我晚參舉劉鐵磨到溈山山云老牸牛汝來也磨云來日臺山大會齊和尚還去麼山放身臥倒磨便出師云百戰功成老太平優柔誰肯苦爭衡玉鞭金馬閒終日明月清風富一生晚參舉南泉垂語云王老師牧一頭水牯牛擬向溪東去不免犯官家苗稼擬向溪西去不免犯官家苗稼爭如隨分納些些總不見得師云南泉牧牛可謂奇特直得一切處關防不得為甚麼如此是他隨分納些些晚參舉僧問乾峰十方婆伽梵一路涅槃門未審路頭在什麼處峰以柱杖一畫云在者裏僧復問雲門門云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾會麼師云入手還將死馬醫反魂香欲起君危一期拶出通身汗方信儂家不惜眉晚參舉米胡和尚令僧問仰山今時人還假悟否山云悟即不無爭奈落第二頭何胡深肯之師云第二頭號分悟迷快須撒手捨筌功兮未盡成胼拇智也難知覺噬臍兔老冰盤秋露泣鳥寒玉樹曉風棲持來大仰辨真假痕玷渾無貴白圭晚參舉黃蘗問百丈從上相承底事如何指示於人丈踞坐蘗云後代兒孫將何傳授丈云將為你是箇人便歸方丈師云言滿天下無口過行滿天下無怨惡還他百丈黃蘗不是不知有且要此話大行還會百丈歸方丈麼林間風葉落化外水天秋晚參舉僧問夾山撥塵見佛時如何山云直須揮劍若不揮劍漁父棲巢僧問石霜撥塵見佛時如何霜云渠無國土何處逢渠僧回舉似夾山山乃上堂舉了云門庭施設不如老僧入理深談猶較石霜百步師云拂牛劍氣洗兵威定亂歸功更是誰一旦氛埃清四海垂衣皇化自無為晚參舉趙州問投子大死底人卻活時如何子云不許夜行投明須到師云芥城劫石妙窮初活眼寰中照廓虛不許夜行投曉到家音未肯付鴻魚晚參舉風穴垂語云若立一塵家國興盛不立一塵家國喪亡師拈拄杖云還有同生同死底衲僧麼復云皤然渭水起垂綸何似首陽清餓人只在一塵分變態高名勛業兩難泯示衆示衆參學眼目須辨來端莫認頑空便為自己洞山五位曲為今時不究根源妄生階塹古德云莫將真際雜頑空又云心同虛空界示等虛空法又云莫於中路事空王策杖還須到本鄉正偏之旨妙在體前五位君臣功勳王子名異體同毫髮有差誤萬劫繫驢橛君為正位臣為偏位君視臣為正中偏臣奉君為偏中正君臣道合兼帶語也如森羅萬象日月星辰乾坤大地色空明暗盡屬今時傍求妙協切忌當頭明顯玄旨是正中來交鋒兩刃不懼死生泥牛吼月木馬嘶風火裡蓮花方有出身之路是兼中至直造玄宗不坐他床榻冥應衆緣不隨諸有非染非淨非正非偏虛玄大道無著真宗從上先德推此一位最妙最玄是兼中到朕兆未萌會要借功明位影響才露還須借位明功分一句子菊花紅蓼正芬芳借一句子月船親到水雲鄉恁麼時恁麼處恁麼來恁麼去其來也內紹到家其去也傍分借路月色練鋪江曲蘆花月映門頭分明只是箇人宛轉歸來舊處
